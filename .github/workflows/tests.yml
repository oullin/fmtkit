name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    lint:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                module:
                    - formatter
                    - vet
                    - driver

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - uses: golangci/golangci-lint-action@v8
              name: Lint ${{ matrix.module }}
              with:
                  version: v2.12.2
                  working-directory: packages/go/${{ matrix.module }}

    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - sidecar

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'sidecar'
              name: Install Go
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: vp run --filter ${{ matrix.workspace }} --fail-if-no-match check

            - name: TypeScript - Run sidecar tests with coverage
              if: matrix.workspace == 'sidecar'
              run: vp run --filter sidecar --fail-if-no-match test:coverage

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Go - Run formatter tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/task.sh with-env go -C packages/go/formatter test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run vet tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/task.sh with-env go -C packages/go/vet test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run driver tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/task.sh with-env go -C packages/go/driver test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - uses: actions/upload-artifact@v4
              name: Upload formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/go/formatter/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@v4
              name: Upload vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/go/vet/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@v4
              name: Upload driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/go/driver/coverage.out
                  if-no-files-found: error

    binary:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-node@v5
              name: Install Node
              with:
                  node-version-file: .nvmrc
                  # This job uses npm only; without this, setup-node v5's cache
                  # auto-detection finds pnpm-lock.yaml and requires pnpm.
                  package-manager-cache: false

            - uses: oven-sh/setup-bun@v2
              name: Install Bun
              with:
                  bun-version: 1.3.14

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - uses: goreleaser/goreleaser-action@v6
              name: Validate GoReleaser config
              with:
                  version: '~> v2'
                  args: check

            - name: Smoke test the self-contained binary
              run: ./infra/test-binary-smoke.sh

            # Runs here rather than in `check`, which has no Go: the only tool
            # that can say whether this tree is formatted is fmtkit itself.
            - name: Check the repository is fmtkit-formatted
              run: ./infra/task.sh self-check

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/download-artifact@v4
              name: Download formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/go/formatter

            - uses: actions/download-artifact@v4
              name: Download vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/go/vet

            - uses: actions/download-artifact@v4
              name: Download driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/go/driver

            - uses: codecov/codecov-action@v5
              name: Upload formatter coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/go/formatter/coverage.out
                  flags: formatter
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@v5
              name: Upload vet coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/go/vet/coverage.out
                  flags: vet
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@v5
              name: Upload driver coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/go/driver/coverage.out
                  flags: driver
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false
