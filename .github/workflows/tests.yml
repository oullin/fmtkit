name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    lint:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                module:
                    - formatter
                    - vet
                    - driver

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              name: Checkout repository

            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
              name: Lint ${{ matrix.module }}
              with:
                  version: v2.12.2
                  working-directory: packages/${{ matrix.module }}

    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - devx

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@8a7496fd44e8a1b0a88a7459e36213b2fefc1d15 # v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              if: matrix.workspace != 'devx'
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: vp run --filter ${{ matrix.workspace }} --fail-if-no-match check

            - name: TypeScript - Run devx tests with coverage
              if: matrix.workspace == 'devx'
              run: vp run --filter devx --fail-if-no-match test:coverage

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              name: Checkout repository

            - name: Shell - Run entrypoint tests
              run: ./infra/scripts/tasks/test-entrypoints.sh

            - uses: voidzero-dev/setup-vp@8a7496fd44e8a1b0a88a7459e36213b2fefc1d15 # v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Go - Run formatter tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/formatter test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run vet tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/vet test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run driver tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/driver test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              name: Upload formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              name: Upload vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/vet/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              name: Upload driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/driver/coverage.out
                  if-no-files-found: error

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              name: Checkout repository

            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              name: Download formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter

            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              name: Download vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/vet

            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              name: Download driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/driver

            - uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
              name: Upload formatter coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/formatter/coverage.out
                  flags: formatter
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
              name: Upload vet coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/vet/coverage.out
                  flags: vet
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
              name: Upload driver coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/driver/coverage.out
                  flags: driver
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

    contained_runtime:
        name: Contained runtime (${{ matrix.goos }}/${{ matrix.goarch }})
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-14
                      goos: darwin
                      goarch: arm64
                    - runner: ubuntu-22.04
                      goos: linux
                      goarch: amd64
                    - runner: ubuntu-22.04-arm
                      goos: linux
                      goarch: arm64

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              name: Checkout repository

            - uses: ./.github/actions/contained-runtime
              name: Build contained runtime
              with:
                  goos: ${{ matrix.goos }}
                  goarch: ${{ matrix.goarch }}
                  artifact-name: fmt-all-${{ matrix.goos }}-${{ matrix.goarch }}
