name: Publish Release

# Release publishing is invoked explicitly from Release Tag; tag pushes are not
# a supported publish trigger path in this repository.
on:
    workflow_call:
        inputs:
            tag:
                description: Release tag to publish, for example v0.0.12
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish or retry, for example v0.0.12
                required: true
                type: string

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    RELEASE_TAG: ${{ inputs.tag }}

concurrency:
    group: publish-release-${{ inputs.tag }}
    cancel-in-progress: false

jobs:
    # Creates the release, attaches the self-contained fmtkit binaries to it, and
    # pushes the Homebrew cask to oullin/homebrew-fmtkit.
    binaries:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: ./infra/release/verify-release-tag.sh
              shell: bash

            - uses: actions/setup-node@v5
              with:
                  node-version-file: .nvmrc
                  # This job uses npm only; without this, setup-node v5's cache
                  # auto-detection finds pnpm-lock.yaml and requires pnpm.
                  package-manager-cache: false

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - uses: actions/setup-go@v6
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
packages/go/go.mod
packages/go/go.sum|cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            # Creates the release up front so goreleaser (release.mode
            # keep-existing) attaches its assets to it, and so the notes come
            # from GitHub's generator rather than goreleaser's changelog.
            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  prerelease: false
                  generate_release_notes: true

            - name: Build and publish release binaries
              uses: goreleaser/goreleaser-action@v6
              with:
                  version: '~> v2'
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}
