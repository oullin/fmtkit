name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    check:
        if: github.event_name == 'push' || (github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - devx

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-node@v6
              name: Install Node
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v5
              name: Install pnpm
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'devx'
              name: Install Go
              with:
                  go-version-file: go.work
                  cache-dependency-path: |
                      go.work
                      go.work.sum
                      packages/driver/go.mod
                      packages/driver/go.sum
                      packages/formatter/go.mod
                      packages/formatter/go.sum
                      packages/vet/go.mod

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: ./scripts/with-storage-env.sh pnpm turbo run check --cache-dir=storage/.cache/turbo --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - name: Shell - Run entrypoint tests
              run: ./scripts/test-entrypoints.sh

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: go.work
                  cache-dependency-path: |
                      go.work
                      go.work.sum
                      packages/driver/go.mod
                      packages/driver/go.sum
                      packages/formatter/go.mod
                      packages/formatter/go.sum
                      packages/vet/go.mod

            - name: Go - Run formatter tests with race detector and coverage
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/formatter test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run vet tests with race detector
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/vet test ./... -race -v

            - name: Go - Run driver tests with race detector
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/driver test ./... -race -v

            - uses: actions/upload-artifact@v4
              name: Upload coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter/coverage.out
                  if-no-files-found: error

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/download-artifact@v4
              name: Download coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter

            - uses: codecov/codecov-action@v5
              name: Upload coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/formatter/coverage.out
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false
