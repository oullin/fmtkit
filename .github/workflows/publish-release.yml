name: Publish Release

# Release publishing is invoked explicitly from Release Tag; tag pushes are not
# a supported publish trigger path in this repository.
on:
    workflow_call:
        inputs:
            tag:
                description: Release tag to publish, for example v0.0.12
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish or retry, for example v0.0.12
                required: true
                type: string

permissions: {}

env:
    IMAGE_NAME: ghcr.io/oullin/fmtkit
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    RELEASE_TAG: ${{ inputs.tag }}

concurrency:
    group: publish-release-${{ inputs.tag }}
    cancel-in-progress: false

jobs:
    contained_runtime_darwin_arm64:
        runs-on: macos-14
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: ./infra/scripts/release/verify-release-tag.sh
              shell: bash

            - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.0.1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Package and build contained runtime
              run: |
                  vp run runtime:contained
                  vp run release:contained
                  shasum -a 256 storage/dist/fmt-all-darwin-arm64 > storage/dist/fmt-all-darwin-arm64.sha256

            - name: Verify contained release assets
              run: |
                  test -f storage/dist/fmt-all-darwin-arm64
                  test -f storage/dist/fmt-all-darwin-arm64.sha256
                  test -f packages/driver/internal/full/assets/runtime-darwin-arm64.tar.gz.manifest.json
              shell: bash

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              name: Upload contained release artifact
              with:
                  name: fmt-all-darwin-arm64
                  path: |
                      storage/dist/fmt-all-darwin-arm64
                      storage/dist/fmt-all-darwin-arm64.sha256
                      packages/driver/internal/full/assets/runtime-darwin-arm64.tar.gz.manifest.json
                  if-no-files-found: error

    publish:
        needs: contained_runtime_darwin_arm64
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: ./infra/scripts/release/verify-release-tag.sh
              shell: bash

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Go image
              id: build-go
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./infra/docker/Dockerfile.golang
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-go
                      ${{ env.IMAGE_NAME }}:latest-go
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}
                  cache-from: type=gha,scope=go
                  cache-to: type=gha,mode=max,scope=go

            - name: Build and push Node/TS image
              id: build-node-ts
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./infra/docker/Dockerfile.node-ts
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-node-ts
                      ${{ env.IMAGE_NAME }}:latest-node-ts
                  cache-from: type=gha,scope=node-ts
                  cache-to: type=gha,mode=max,scope=node-ts

            - name: Build and push full image
              id: build-full
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./infra/docker/Dockerfile.full
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-full
                      ${{ env.IMAGE_NAME }}:latest-full
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}
                  cache-from: type=gha,scope=full
                  cache-to: type=gha,mode=max,scope=full

            - name: Verify published release image
              env:
                  NEW_TAG: ${{ env.RELEASE_TAG }}
              run: ./infra/scripts/release/verify-release-image.sh
              shell: bash

            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              name: Download contained release artifact
              with:
                  name: fmt-all-darwin-arm64
                  path: storage/release

            - name: Verify contained release checksum
              run: |
                  cd storage/release
                  test -f fmt-all-darwin-arm64
                  test -f fmt-all-darwin-arm64.sha256
                  test -f runtime-darwin-arm64.tar.gz.manifest.json
                  shasum -a 256 -c fmt-all-darwin-arm64.sha256
              shell: bash

            - name: Promote verified full image to compatibility tags
              env:
                  DIGEST: ${{ steps.build-full.outputs.digest }}
              run: |
                  set -euo pipefail

                  docker buildx imagetools create \
                      --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
                      --tag "${IMAGE_NAME}:latest" \
                      "${IMAGE_NAME}@${DIGEST}"
              shell: bash

            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      Docker images published:

                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-go`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-node-ts`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-full`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}` aliases the verified full image

                      Latest tags updated:

                      - `${{ env.IMAGE_NAME }}:latest-go`
                      - `${{ env.IMAGE_NAME }}:latest-node-ts`
                      - `${{ env.IMAGE_NAME }}:latest-full`
                      - `${{ env.IMAGE_NAME }}:latest` aliases the verified full image
                  files: |
                      storage/release/fmt-all-darwin-arm64
                      storage/release/fmt-all-darwin-arm64.sha256
                      storage/release/runtime-darwin-arm64.tar.gz.manifest.json
                  fail_on_unmatched_files: true
