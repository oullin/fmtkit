name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    lint:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                module:
                    - formatter
                    - vet
                    - driver

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - uses: golangci/golangci-lint-action@v8
              name: Lint ${{ matrix.module }}
              with:
                  version: v2.12.2
                  working-directory: packages/${{ matrix.module }}

    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - devx

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'devx'
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: vp run --filter ${{ matrix.workspace }} --fail-if-no-match check

            - name: TypeScript - Run devx tests with coverage
              if: matrix.workspace == 'devx'
              run: vp run --filter devx --fail-if-no-match test:coverage

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - name: Shell - Run entrypoint tests
              run: ./infra/scripts/tasks/test-entrypoints.sh

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Go - Run formatter tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/formatter test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run vet tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/vet test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run driver tests with race detector and coverage
              run: CGO_ENABLED=1 ./infra/scripts/tasks/with-storage-env.sh go -C packages/driver test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - uses: actions/upload-artifact@v4
              name: Upload formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@v4
              name: Upload vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/vet/coverage.out
                  if-no-files-found: error

            - uses: actions/upload-artifact@v4
              name: Upload driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/driver/coverage.out
                  if-no-files-found: error

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/download-artifact@v4
              name: Download formatter coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter

            - uses: actions/download-artifact@v4
              name: Download vet coverage artifact
              with:
                  name: vet-coverage
                  path: packages/vet

            - uses: actions/download-artifact@v4
              name: Download driver coverage artifact
              with:
                  name: driver-coverage
                  path: packages/driver

            - uses: codecov/codecov-action@v5
              name: Upload formatter coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/formatter/coverage.out
                  flags: formatter
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@v5
              name: Upload vet coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/vet/coverage.out
                  flags: vet
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

            - uses: codecov/codecov-action@v5
              name: Upload driver coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/driver/coverage.out
                  flags: driver
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false

    contained_runtime_darwin_arm64:
        runs-on: macos-14

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: go.mod
                  cache-dependency-path: |
                      go.mod
                      go.sum

            - name: Package and build contained runtime
              run: |
                  vp run runtime:contained
                  vp run release:contained

            - name: Verify contained binary without host Node or Go
              run: |
                  fixture="$(mktemp -d)"
                  cache="$(mktemp -d)"
                  cache="$(cd "$cache" && pwd -P)"
                  trap 'rm -rf "$fixture" "$cache"' EXIT
                  chmod 700 "$cache"
                  cat >"$fixture/sample.ts" <<'EOF'
                  export const value={answer:42}
                  EOF
                  cat >"$fixture/Component.vue" <<'EOF'
                  <script setup lang="ts">
                  const message='hello'
                  </script>
                  <template><main>{{message}}</main></template>
                  EOF
                  cat >"$fixture/go.mod" <<'EOF'
                  module example.com/containedfixture

                  go 1.26.4
                  EOF
                  cat >"$fixture/main.go" <<'EOF'
                  package containedfixture

                  func Answer()int{return 42}
                  EOF
                  cd "$fixture"
                  binary="${GITHUB_WORKSPACE}/storage/dist/fmt-all-darwin-arm64"
                  env PATH=/usr/bin:/bin GO_FMT_RUNTIME_DIR="$cache" "$binary" version
                  env PATH=/usr/bin:/bin GO_FMT_RUNTIME_DIR="$cache" "$binary" format .
                  env PATH=/usr/bin:/bin GO_FMT_RUNTIME_DIR="$cache" "$binary" check .
                  test -z "$(find "$cache" -type l -print -quit)"
                  test -z "$(find "$cache" -perm -0077 -print -quit)"

            - name: Write contained binary checksum
              run: shasum -a 256 storage/dist/fmt-all-darwin-arm64 > storage/dist/fmt-all-darwin-arm64.sha256

            - uses: actions/upload-artifact@v4
              name: Upload contained runtime artifact
              with:
                  name: fmt-all-darwin-arm64
                  path: |
                      storage/dist/fmt-all-darwin-arm64
                      storage/dist/fmt-all-darwin-arm64.sha256
                      packages/driver/internal/full/assets/runtime-darwin-arm64.tar.gz.manifest.json
                  if-no-files-found: error
