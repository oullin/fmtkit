name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - devx

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'devx'
              name: Install Go
              with:
                  go-version-file: go.work
                  cache-dependency-path: |
                      go.work
                      go.work.sum
                      packages/driver/go.mod
                      packages/driver/go.sum
                      packages/formatter/go.mod
                      packages/formatter/go.sum
                      packages/vet/go.mod

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: vp run --filter ${{ matrix.workspace }} --fail-if-no-match check

            - name: TypeScript - Run devx tests with coverage
              if: matrix.workspace == 'devx'
              run: vp run --filter devx --fail-if-no-match test:coverage

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - name: Shell - Run entrypoint tests
              run: ./scripts/test-entrypoints.sh

            - uses: voidzero-dev/setup-vp@v1
              name: Install Vite+
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: go.work
                  cache-dependency-path: |
                      go.work
                      go.work.sum
                      packages/driver/go.mod
                      packages/driver/go.sum
                      packages/formatter/go.mod
                      packages/formatter/go.sum
                      packages/vet/go.mod

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Go - Run formatter tests with race detector and coverage
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/formatter test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run vet tests with race detector
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/vet test ./... -race -v

            - name: Go - Run driver tests with race detector
              run: CGO_ENABLED=1 ./scripts/with-storage-env.sh go -C packages/driver test ./... -race -v

            - uses: actions/upload-artifact@v4
              name: Upload coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter/coverage.out
                  if-no-files-found: error

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/download-artifact@v4
              name: Download coverage artifact
              with:
                  name: formatter-coverage
                  path: packages/formatter

            - uses: codecov/codecov-action@v5
              name: Upload coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/formatter/coverage.out
                  override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                  fail_ci_if_error: false
