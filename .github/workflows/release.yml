name: Release Tag

on:
    push:
        branches:
            - main

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
    group: release-tag-main
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - formatter
                    - vet
                    - driver
                    - sidecar

        steps:
            - uses: actions/checkout@v6

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'sidecar'
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Run ${{ matrix.workspace }} checks
              run: vp run --filter ${{ matrix.workspace }} --fail-if-no-match check

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: 25.8.2
                  cache: true

            - uses: actions/setup-go@v6
              with:
                  go-version-file: packages/go/go.mod
                  cache-dependency-path: |
                      packages/go/go.mod
                      packages/go/go.sum

            - name: Install workspace dependencies
              run: vp install --frozen-lockfile

            - name: Go - Run all tests with the race detector
              run: vp run test-race

    create_tag:
        needs:
            - check
            - test
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            tag: ${{ steps.version.outputs.new_tag }}

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Create release tag
              id: version
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_PREFIX: v
                  DEFAULT_BUMP: patch
              run: ./infra/release/create-release-tag.sh

    # Publishing is invoked directly so this workflow does not rely on tag-push
    # fan-out from a workflow-created tag.
    publish_release:
        needs: create_tag
        if: needs.create_tag.outputs.tag != ''
        permissions:
            contents: write
            packages: write
        uses: ./.github/workflows/publish-release.yml
        secrets: inherit
        with:
            tag: ${{ needs.create_tag.outputs.tag }}
