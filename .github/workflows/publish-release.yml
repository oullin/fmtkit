name: Publish Release

# Release publishing is invoked explicitly from Release Tag; tag pushes are not
# a supported publish trigger path in this repository.
on:
    workflow_call:
        inputs:
            tag:
                description: Release tag to publish, for example v0.0.12
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish or retry, for example v0.0.12
                required: true
                type: string

permissions:
    contents: write
    packages: write

env:
    IMAGE_NAME: ghcr.io/oullin/go-fmt
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    RELEASE_TAG: ${{ inputs.tag }}

concurrency:
    group: publish-release-${{ inputs.tag }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: ./scripts/verify-release-tag.sh
              shell: bash

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Go image
              id: build-go
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./docker/Dockerfile.go
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-go
                      ${{ env.IMAGE_NAME }}:latest-go
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}

            - name: Build and push Node/TS image
              id: build-node-ts
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./docker/Dockerfile.node-ts
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-node-ts
                      ${{ env.IMAGE_NAME }}:latest-node-ts

            - name: Build and push full image
              id: build-full
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./docker/Dockerfile.full
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-full
                      ${{ env.IMAGE_NAME }}:latest-full
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}

            - name: Verify published release image
              env:
                  NEW_TAG: ${{ env.RELEASE_TAG }}
              run: ./scripts/verify-release-image.sh
              shell: bash

            - name: Promote verified full image to compatibility tags
              env:
                  DIGEST: ${{ steps.build-full.outputs.digest }}
              run: |
                  set -euo pipefail

                  docker buildx imagetools create \
                      --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
                      --tag "${IMAGE_NAME}:latest" \
                      "${IMAGE_NAME}@${DIGEST}"
              shell: bash

            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      Docker images published:

                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-go`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-node-ts`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-full`
                      - `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}` aliases the verified full image

                      Latest tags updated:

                      - `${{ env.IMAGE_NAME }}:latest-go`
                      - `${{ env.IMAGE_NAME }}:latest-node-ts`
                      - `${{ env.IMAGE_NAME }}:latest-full`
                      - `${{ env.IMAGE_NAME }}:latest` aliases the verified full image
